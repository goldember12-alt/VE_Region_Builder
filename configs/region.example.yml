region:
  name: my_region
  model_region: My Region
  scenario: Base
  description: VERSPM for My Region model
  base_year: 2024
  years:
    - 2024
    - 2045
  mareas:
    - Example Marea
  # Used only for manifest rows declared at geo_level: Region.
  # Marea/Azone/Bzone values are derived from paths.geography_file.
  region_geo_values:
    - Virginia
  # auto infers absent when the source geography has no meaningful Czone values.
  # In absent mode, RegionBuilder writes VisionEval's required Czone column with
  # literal NA values to represent unspecified Czones.
  czone_mode: auto

paths:
  source_model_dir: outputs/generated_models/statewide_va_clean
  output_model_dir: outputs/generated_models/my_region
  validation_report: outputs/reports/my_region_validation.csv
  manifest: metadata/input_manifest.csv
  geography_file: defs/geo.csv
